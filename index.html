<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic RingWeasel</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #472c50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        .game-container {
            background: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        canvas {
            border: 3px solid #ecf0f1;
            background: #000;
            display: block;
            border-radius: 5px;
        }
        
        .controls {
            color: white;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        
        .controls h3 {
            margin: 0 0 10px 0;
            color: #ecf0f1;
        }
        
        .key {
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-weight: bold;
            margin: 0 2px;
        }

        #battlepassPanel {
            display: none;
            position: fixed;
            right: 20px;
            top: 20px;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            border: 3px solid #f39c12;
            border-radius: 10px;
            padding: 20px;
            color: white;
            font-family: Arial, sans-serif;
            width: 250px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        #battlepassPanel h3 {
            margin: 0 0 10px 0;
            color: #f39c12;
            text-align: center;
            font-size: 18px;
            text-transform: uppercase;
        }

        .bp-level-display {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #f39c12;
            margin: 10px 0;
        }

        .bp-xp-bar {
            background: #34495e;
            border: 2px solid #95a5a6;
            border-radius: 5px;
            height: 20px;
            overflow: hidden;
            margin: 10px 0;
        }

        .bp-xp-fill {
            background: linear-gradient(90deg, #3498db 0%, #2ecc71 100%);
            height: 100%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            font-weight: bold;
        }

        .bp-rewards-list {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }

        .bp-reward-item {
            background: rgba(52, 73, 94, 0.6);
            border-left: 3px solid #2ecc71;
            padding: 8px;
            margin: 5px 0;
            border-radius: 3px;
        }

        .bp-reward-item.claimed {
            border-left-color: #f39c12;
            opacity: 0.7;
        }

        .bp-reward-level {
            font-weight: bold;
            color: #f39c12;
            font-size: 11px;
        }

        .bp-toggle-btn {
            position: fixed;
            right: 20px;
            top: 20px;
            background: #f39c12;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .bp-toggle-btn:hover {
            background: #e67e22;
        }
    </style>
</head>
<body>
    <button class="bp-toggle-btn" id="bpToggleBtn" title="Press to toggle battlepass">🎖️</button>
    
    <div id="battlepassPanel">
        <h3>⚔️ Battlepass</h3>
        <div class="bp-level-display" id="bpLevel">Level 1</div>
        <div class="bp-xp-bar">
            <div class="bp-xp-fill" id="bpXpBar" style="width: 0%">
                <span id="bpXpText">0/100</span>
            </div>
        </div>
        <div class="bp-rewards-list" id="bpRewardsList">
            <div class="bp-reward-item">
                <div class="bp-reward-level">Level 1</div>
                <div>🎨 Epic Color: Blue</div>
            </div>
        </div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="controls">
            <h3>Controls</h3>
            <p>Use <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> to move. Press <span class="key">L</span> to open a lootbox. Press <span class="key">B</span> for battlepass.</p>
            <p>Watch the yellow circle for upcoming ring spawns.</p>
            <p><button id="paypalButton">Buy a skin / Donate</button> <span id="clearDataBtn" style="cursor: pointer; color: #ecf0f1; margin-left: 20px;">🗑️ Clear Battlepass Data</span></p>
        </div>
    </div>

    <script>
        class WeaselGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
                
                // Game settings
                this.gameWidth = this.canvas.width;
                this.gameHeight = this.canvas.height;
                
                // Player settings
                this.player = {
                    x: this.gameWidth / 2,
                    y: this.gameHeight / 2,
                    width: 64,
                    height: 64,
                    speed: 5,
                    image: null,
                    imageLoaded: false,
                    shapeIndex: 0,
                    shapes: ['square','circle','triangle']
                };
                
                // Input handling
                this.keys = {
                    w: false,
                    a: false,
                    s: false,
                    d: false
                };
                
                // Game state
                this.gameState = 'playing'; // 'playing' or 'gameOver'
                this.gameStartTime = Date.now();
                this.gameEndTime = null;
                
                // Rings
                this.rings = [];

                // Puppy background
                this.puppyImage = new Image();
                this.puppyPattern = null;
                this.ringSpawnDelay = 3000; // 3 seconds
                this.lastRingSpawn = 0;
                this.ringsSpawned = 0;

                // Upcoming spawn preview
                this.nextRingPosition = null;
                this.previewShown = false;
                this.previewDuration = 1000; // ms before spawn
                
                // Battlepass & lootboxes
                this.battlepassLevel = 1;
                this.battlepassXP = 0;
                this.lastXPUpdate = 0;
                this.lootboxes = 0;

                // Battlepass Rewards
                this.battlepassRewards = [
                    { level: 1, name: '🎨 Epic Color: Blue', effect: 'playerColor', value: '#3498db', claimed: true },
                    { level: 2, name: '⚡ Speed Boost +2', effect: 'speedBoost', value: 2, claimed: false },
                    { level: 3, name: '🎨 Epic Color: Crimson', effect: 'playerColor', value: '#e74c3c', claimed: false },
                    { level: 4, name: '🛡️ Shield Ability', effect: 'shield', value: 3000, claimed: false },
                    { level: 5, name: '✨ Glow Effect', effect: 'glow', value: true, claimed: false },
                    { level: 6, name: '⚡ Speed Boost +3', effect: 'speedBoost', value: 3, claimed: false },
                    { level: 7, name: '🎨 Epic Color: Gold', effect: 'playerColor', value: '#f39c12', claimed: false },
                    { level: 8, name: '🔥 Fire Trail', effect: 'trail', value: 'fire', claimed: false },
                    { level: 9, name: '💎 Diamond Skin', effect: 'skin', value: 'diamond', claimed: false },
                    { level: 10, name: '👑 LEGENDARY WEASEL 👑', effect: 'legendary', value: true, claimed: false }
                ];
                this.playerColor = '#8B4513';
                this.hasGlow = false;
                this.trail = null;
                this.skin = null;
                this.shield = null;
                this.battlepassOpen = false;

                // Minimap settings
                this.minimapWidth = 200;
                this.minimapHeight = 150;

                // player shape timer
                this.lastShapeChange = 0;
                this.shapeChangeInterval = 5000; // every 5 seconds
                
                // Load saved battlepass data
                this.loadBattlepass();
                
                this.init();
            }
            
            init() {
                // Load player sprite
                this.player.image = new Image();
                this.player.image.onload = () => {
                    this.player.imageLoaded = true;
                };
                this.player.image.onerror = () => {
                    console.log('Could not load weasel.png, using placeholder');
                    this.player.imageLoaded = false;
                };
                this.player.image.src = 'weasel.png';

                // load puppy image for background
                this.puppyImage.src = 'puppy.png';
                this.puppyImage.onload = () => {
                    this.puppyPattern = this.ctx.createPattern(this.puppyImage, 'repeat');
                };
                
                // Set up event listeners
                this.setupInputHandlers();
                
                // Initialize Battlepass UI
                this.updateBattlepassUI();
                
                // Start game loop
                this.gameLoop();
            }
            
            setupInputHandlers() {
                document.addEventListener('keydown', (e) => {
                    switch(e.key.toLowerCase()) {
                        case 'w':
                            if (this.gameState === 'playing') this.keys.w = true;
                            break;
                        case 'a':
                            if (this.gameState === 'playing') this.keys.a = true;
                            break;
                        case 's':
                            if (this.gameState === 'playing') this.keys.s = true;
                            break;
                        case 'd':
                            if (this.gameState === 'playing') this.keys.d = true;
                            break;
                        case 'l':
                            if (this.gameState === 'playing' && this.lootboxes > 0) {
                                this.openLootbox();
                            }
                            break;
                        case 'b':
                            this.toggleBattlepass();
                            break;
                        case ' ':
                            e.preventDefault();
                            if (this.gameState === 'gameOver') {
                                this.resetGameState();
                            }
                            break;
                    }
                    if (this.gameState === 'playing') {
                        e.preventDefault();
                    }
                });

                // paypal button handler
                const btn = document.getElementById('paypalButton');
                if (btn) {
                    btn.addEventListener('click', () => {
                        // use PayPal.me link with provided username
                        window.open('https://www.paypal.me/KalebDLC', '_blank');
                    });
                }

                // battlepass toggle button
                const bpToggleBtn = document.getElementById('bpToggleBtn');
                if (bpToggleBtn) {
                    bpToggleBtn.addEventListener('click', () => {
                        this.toggleBattlepass();
                    });
                }

                // clear data button
                const clearDataBtn = document.getElementById('clearDataBtn');
                if (clearDataBtn) {
                    clearDataBtn.addEventListener('click', () => {
                        if (confirm('Are you sure you want to clear all battlepass data?')) {
                            localStorage.removeItem('weaselBattlepass');
                            location.reload();
                        }
                    });
                }

                // Canvas click to play again on game over
                this.canvas.addEventListener('click', () => {
                    if (this.gameState === 'gameOver') {
                        this.resetGameState();
                    }
                });
                
                document.addEventListener('keyup', (e) => {
                    switch(e.key.toLowerCase()) {
                        case 'w':
                            this.keys.w = false;
                            break;
                        case 'a':
                            this.keys.a = false;
                            break;
                        case 's':
                            this.keys.s = false;
                            break;
                        case 'd':
                            this.keys.d = false;
                            break;
                    }
                });
            }
            
            update() {
                if (this.gameState === 'gameOver') return;
                
                // Spawn rings every 3 seconds with preview
                const currentTime = Date.now();
                const nextSpawnTime = this.gameStartTime + this.ringSpawnDelay * (this.ringsSpawned + 1);

                if (this.ringsSpawned < 3) {
                    // show a preview marker one second before spawn
                    if (!this.previewShown && currentTime >= nextSpawnTime - this.previewDuration) {
                        this.nextRingPosition = {
                            x: Math.random() * (this.gameWidth - 60) + 30,
                            y: Math.random() * (this.gameHeight - 60) + 30
                        };
                        this.previewShown = true;
                    }
                    // actually spawn the ring at the previewed location
                    if (this.previewShown && currentTime >= nextSpawnTime) {
                        this.spawnRing(this.nextRingPosition);
                        this.ringsSpawned++;
                        this.previewShown = false;
                        this.nextRingPosition = null;
                    }
                }
                
                // Battlepass XP accrual
                const elapsedSec = Math.floor((currentTime - this.gameStartTime) / 1000);
                if (elapsedSec > this.lastXPUpdate) {
                    this.lastXPUpdate = elapsedSec;
                    this.battlepassXP += 10;
                    if (this.battlepassXP >= 100) {
                        this.battlepassXP -= 100;
                        this.battlepassLevel++;
                        this.claimBattlepassReward();
                    }
                    this.updateBattlepassUI();
                    this.saveBattlepass();
                }

                // randomize player shape periodically
                if (currentTime - this.lastShapeChange >= this.shapeChangeInterval) {
                    this.lastShapeChange = currentTime;
                    this.player.shapeIndex = (this.player.shapeIndex + 1) % this.player.shapes.length;
                }                
                // Handle movement
                if (this.keys.w) {
                    this.player.y -= this.player.speed;
                }
                if (this.keys.s) {
                    this.player.y += this.player.speed;
                }
                if (this.keys.a) {
                    this.player.x -= this.player.speed;
                }
                if (this.keys.d) {
                    this.player.x += this.player.speed;
                }
                
                // Keep player within boundaries
                this.player.x = Math.max(0, Math.min(this.gameWidth - this.player.width, this.player.x));
                this.player.y = Math.max(0, Math.min(this.gameHeight - this.player.height, this.player.y));
                
                // Update rings
                this.updateRings();
                
                // Check collisions
                this.checkCollisions();
            }
            
            draw() {
                // Clear canvas
                this.ctx.clearRect(0, 0, this.gameWidth, this.gameHeight);
                
                // Draw puppy/grass background
                this.drawBackground();
                
                // Draw preview for upcoming ring
                if (this.previewShown && this.nextRingPosition) {
                    this.ctx.strokeStyle = 'rgba(255, 255, 0, 0.7)';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.arc(this.nextRingPosition.x, this.nextRingPosition.y, 30, 0, Math.PI * 2);
                    this.ctx.stroke();
                }

                // Draw rings
                this.drawRings();
                
                // Draw player
                this.drawPlayer();
                
                // Draw UI
                this.drawUI();

                // Draw minimap
                this.drawMinimap();
                
                // Draw game over screen if needed
                if (this.gameState === 'gameOver') {
                    this.drawGameOver();
                }
            }
            
            spawnRing(position = null) {
                const xPos = position ? position.x : Math.random() * (this.gameWidth - 60);
                const yPos = position ? position.y : Math.random() * (this.gameHeight - 60);

                const ring = {
                    x: xPos,
                    y: yPos,
                    radius: 30,
                    speed: 8 + (this.ringsSpawned * 2), // Ring 1: 8, Ring 2: 10, Ring 3: 12
                    dx: (Math.random() - 0.5) * 2, // Random direction
                    dy: (Math.random() - 0.5) * 2
                };
                
                // Normalize direction vector
                const length = Math.sqrt(ring.dx * ring.dx + ring.dy * ring.dy);
                ring.dx = (ring.dx / length) * ring.speed;
                ring.dy = (ring.dy / length) * ring.speed;
                
                this.rings.push(ring);

                // reward the player with a lootbox for every ring spawned
                this.lootboxes++;
            }
            
            updateRings() {
                // Check ring-to-ring collisions first
                for (let i = 0; i < this.rings.length; i++) {
                    for (let j = i + 1; j < this.rings.length; j++) {
                        this.checkRingCollision(this.rings[i], this.rings[j]);
                    }
                }
                
                // Update ring positions
                for (let ring of this.rings) {
                    // Move ring
                    ring.x += ring.dx;
                    ring.y += ring.dy;
                    
                    // Bounce off walls
                    if (ring.x - ring.radius <= 0 || ring.x + ring.radius >= this.gameWidth) {
                        ring.dx = -ring.dx;
                        ring.x = Math.max(ring.radius, Math.min(this.gameWidth - ring.radius, ring.x));
                    }
                    if (ring.y - ring.radius <= 0 || ring.y + ring.radius >= this.gameHeight) {
                        ring.dy = -ring.dy;
                        ring.y = Math.max(ring.radius, Math.min(this.gameHeight - ring.radius, ring.y));
                    }
                }
            }
            
            checkRingCollision(ring1, ring2) {
                const dx = ring2.x - ring1.x;
                const dy = ring2.y - ring1.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < ring1.radius + ring2.radius) {
                    // Calculate collision normal
                    const normalX = dx / distance;
                    const normalY = dy / distance;
                    
                    // Separate rings to prevent overlap
                    const overlap = ring1.radius + ring2.radius - distance;
                    const separationX = normalX * overlap * 0.5;
                    const separationY = normalY * overlap * 0.5;
                    
                    ring1.x -= separationX;
                    ring1.y -= separationY;
                    ring2.x += separationX;
                    ring2.y += separationY;
                    
                    // Calculate relative velocity
                    const relativeVelocityX = ring2.dx - ring1.dx;
                    const relativeVelocityY = ring2.dy - ring1.dy;
                    
                    // Calculate relative velocity along normal
                    const velocityAlongNormal = relativeVelocityX * normalX + relativeVelocityY * normalY;
                    
                    // Don't resolve if objects are separating
                    if (velocityAlongNormal > 0) return;
                    
                    // Calculate impulse scalar (assuming equal mass)
                    const impulse = -2 * velocityAlongNormal / 2;
                    
                    // Apply impulse to velocities
                    ring1.dx -= impulse * normalX;
                    ring1.dy -= impulse * normalY;
                    ring2.dx += impulse * normalX;
                    ring2.dy += impulse * normalY;
                }
            }
            
            checkCollisions() {
                const playerCenterX = this.player.x + this.player.width / 2;
                const playerCenterY = this.player.y + this.player.height / 2;
                const playerRadius = Math.min(this.player.width, this.player.height) / 2;
                
                for (let ring of this.rings) {
                    const distance = Math.sqrt(
                        Math.pow(playerCenterX - ring.x, 2) + 
                        Math.pow(playerCenterY - ring.y, 2)
                    );
                    
                    if (distance < playerRadius + ring.radius) {
                        // Check if shield is active
                        if (this.shield && Date.now() - this.shield.startTime < this.shield.duration) {
                            // Shield blocks the collision
                            alert('🛡️ Your shield protected you!');
                            this.shield = null;
                            return;
                        }
                        this.gameState = 'gameOver';
                        this.gameEndTime = Date.now();
                        return;
                    }
                }
            }
            
            openLootbox() {
                if (this.lootboxes <= 0) return;
                const choice = Math.random();
                if (choice < 0.5) {
                    this.player.speed += 1;
                    alert('You opened a lootbox and got a speed boost!');
                } else {
                    this.battlepassXP += 50;
                    if (this.battlepassXP >= 100) {
                        this.battlepassXP -= 100;
                        this.battlepassLevel++;
                        this.claimBattlepassReward();
                    }
                    this.updateBattlepassUI();
                    alert('You opened a lootbox and got 50 XP!');
                }
                this.lootboxes--;
                this.saveBattlepass();
            }

            toggleBattlepass() {
                this.battlepassOpen = !this.battlepassOpen;
                const panel = document.getElementById('battlepassPanel');
                if (panel) {
                    panel.style.display = this.battlepassOpen ? 'block' : 'none';
                }
            }

            updateBattlepassUI() {
                const levelDisplay = document.getElementById('bpLevel');
                const xpBar = document.getElementById('bpXpBar');
                const xpText = document.getElementById('bpXpText');

                if (levelDisplay) {
                    levelDisplay.textContent = `Level ${this.battlepassLevel}`;
                }
                if (xpBar) {
                    xpBar.style.width = `${this.battlepassXP}%`;
                    if (xpText) {
                        xpText.textContent = `${this.battlepassXP}/100`;
                    }
                }

                this.updateRewardsList();
            }

            updateRewardsList() {
                const rewardsList = document.getElementById('bpRewardsList');
                if (!rewardsList) return;

                rewardsList.innerHTML = '';
                for (let reward of this.battlepassRewards) {
                    const item = document.createElement('div');
                    item.className = 'bp-reward-item';
                    if (reward.claimed) {
                        item.classList.add('claimed');
                    }
                    item.innerHTML = `<div class="bp-reward-level">Level ${reward.level} ${reward.claimed ? '✓' : ''}</div><div>${reward.name}</div>`;
                    rewardsList.appendChild(item);
                }
            }

            claimBattlepassReward() {
                const reward = this.battlepassRewards.find(r => r.level === this.battlepassLevel);
                if (!reward) return;

                reward.claimed = true;
                
                switch (reward.effect) {
                    case 'playerColor':
                        this.playerColor = reward.value;
                        alert(`🎨 Tier ${reward.level}: You unlocked ${reward.name}!`);
                        break;
                    case 'speedBoost':
                        this.player.speed += reward.value;
                        alert(`⚡ Tier ${reward.level}: Your speed increased by ${reward.value}!`);
                        break;
                    case 'glow':
                        this.hasGlow = reward.value;
                        alert(`✨ Tier ${reward.level}: You now glow!`);
                        break;
                    case 'shield':
                        this.shield = { duration: reward.value, startTime: Date.now() };
                        alert(`🛡️ Tier ${reward.level}: Shield activated for 3 seconds!`);
                        break;
                    case 'trail':
                        this.trail = reward.value;
                        alert(`🔥 Tier ${reward.level}: You have a ${reward.value} trail!`);
                        break;
                    case 'skin':
                        this.skin = reward.value;
                        alert(`💎 Tier ${reward.level}: You unlocked the ${reward.value} skin!`);
                        break;
                    case 'legendary':
                        this.skin = 'legendary';
                        this.playerColor = '#ffd700';
                        this.hasGlow = true;
                        alert(`👑 Tier ${reward.level}: YOU ARE NOW LEGENDARY! 👑`);
                        break;
                }

                this.updateBattlepassUI();
                this.saveBattlepass();
            }

            saveBattlepass() {
                const data = {
                    level: this.battlepassLevel,
                    xp: this.battlepassXP,
                    rewards: this.battlepassRewards,
                    playerColor: this.playerColor,
                    hasGlow: this.hasGlow,
                    skin: this.skin,
                    baseSpeed: this.player.speed - 5 // Save extra speed gained from rewards
                };
                localStorage.setItem('weaselBattlepass', JSON.stringify(data));
            }

            loadBattlepass() {
                const saved = localStorage.getItem('weaselBattlepass');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        this.battlepassLevel = data.level || 1;
                        this.battlepassXP = data.xp || 0;
                        this.battlepassRewards = data.rewards || this.battlepassRewards;
                        this.playerColor = data.playerColor || '#8B4513';
                        this.hasGlow = data.hasGlow || false;
                        this.skin = data.skin || null;
                        // Apply extra speed from rewards
                        if (data.baseSpeed) {
                            this.player.speed = 5 + data.baseSpeed;
                        }
                    } catch (e) {
                        console.error('Failed to load battlepass data:', e);
                    }
                }
            }

            resetGameState() {
                // Reset only game-specific state, keeping battlepass data
                this.gameState = 'playing';
                this.gameStartTime = Date.now();
                this.gameEndTime = null;
                this.rings = [];
                this.lastRingSpawn = 0;
                this.ringsSpawned = 0;
                this.nextRingPosition = null;
                this.previewShown = false;
                this.lastXPUpdate = 0;
                this.lootboxes = 0;
                this.battlepassXP = 0;
                this.shield = null;
                this.lastShapeChange = 0;
                this.player.x = this.gameWidth / 2;
                this.player.y = this.gameHeight / 2;
                this.player.shapeIndex = 0;
                this.battlepassOpen = false;
                const panel = document.getElementById('battlepassPanel');
                if (panel) {
                    panel.style.display = 'none';
                }
            }
            
            drawRings() {
                this.ctx.strokeStyle = '#ff0000';
                this.ctx.lineWidth = 4;
                
                for (let ring of this.rings) {
                    this.ctx.beginPath();
                    this.ctx.arc(ring.x, ring.y, ring.radius, 0, Math.PI * 2);
                    this.ctx.stroke();
                }
            }
            
            drawBackground() {
                // draw puppy background if loaded, otherwise fallback to grass
                if (this.puppyPattern) {
                    this.ctx.fillStyle = this.puppyPattern;
                    this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight);
                } else {
                    this.ctx.fillStyle = '#2ecc71';
                    this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight);
                }
                
                // add some texture dots
                this.ctx.fillStyle = '#27ae60';
                for (let x = 0; x < this.gameWidth; x += 20) {
                    for (let y = 0; y < this.gameHeight; y += 20) {
                        if (Math.random() > 0.7) {
                            this.ctx.fillRect(x, y, 2, 2);
                        }
                    }
                }
            }
            
            drawPlayer() {
                const shape = this.player.shapes[this.player.shapeIndex];

                // Draw glow effect
                if (this.hasGlow) {
                    this.ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
                    this.ctx.beginPath();
                    this.ctx.arc(this.player.x + this.player.width/2, this.player.y + this.player.height/2, this.player.width/2 + 15, 0, Math.PI * 2);
                    this.ctx.fill();
                }

                if (this.player.imageLoaded && this.player.image.complete) {
                    // draw image normally
                    this.ctx.drawImage(
                        this.player.image,
                        this.player.x,
                        this.player.y,
                        this.player.width,
                        this.player.height
                    );
                } else {
                    // draw placeholder shape based on current shape
                    switch(shape) {
                        case 'square':
                            this.ctx.fillStyle = this.playerColor;
                            this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                            break;
                        case 'circle':
                            this.ctx.fillStyle = this.playerColor;
                            this.ctx.beginPath();
                            this.ctx.arc(this.player.x + this.player.width/2, this.player.y + this.player.height/2, this.player.width/2, 0, Math.PI*2);
                            this.ctx.fill();
                            break;
                        case 'triangle':
                            this.ctx.fillStyle = this.playerColor;
                            this.ctx.beginPath();
                            this.ctx.moveTo(this.player.x + this.player.width/2, this.player.y);
                            this.ctx.lineTo(this.player.x, this.player.y + this.player.height);
                            this.ctx.lineTo(this.player.x + this.player.width, this.player.y + this.player.height);
                            this.ctx.closePath();
                            this.ctx.fill();
                            break;
                    }
                    // draw eyes/nose regardless on shape
                    this.ctx.fillStyle = '#000';
                    this.ctx.fillRect(this.player.x + 15, this.player.y + 15, 8, 8);
                    this.ctx.fillRect(this.player.x + 35, this.player.y + 15, 8, 8);
                    this.ctx.fillStyle = '#FF69B4';
                    this.ctx.fillRect(this.player.x + 28, this.player.y + 30, 6, 4);
                }

                // Draw shield if active
                if (this.shield && Date.now() - this.shield.startTime < this.shield.duration) {
                    this.ctx.strokeStyle = 'rgba(0, 150, 255, 0.7)';
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();
                    this.ctx.arc(this.player.x + this.player.width/2, this.player.y + this.player.height/2, this.player.width/2 + 10, 0, Math.PI * 2);
                    this.ctx.stroke();
                } else if (this.shield) {
                    this.shield = null;
                }
            }
            
            drawUI() {
                // Draw position indicator and stats
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                this.ctx.fillRect(10, 10, 200, 140);
                
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '14px Arial';
                this.ctx.textAlign = 'left';
                this.ctx.fillText(`Position: ${Math.round(this.player.x)}, ${Math.round(this.player.y)}`, 20, 30);
                this.ctx.fillText(`Speed: ${this.player.speed}`, 20, 50);
                this.ctx.fillText(`Rings: ${this.rings.length}/3`, 20, 70);
                this.ctx.fillText(`BP Lv: ${this.battlepassLevel}`, 20, 90);
                this.ctx.fillText(`XP: ${this.battlepassXP}/100`, 20, 110);
                this.ctx.fillText(`Lootboxes: ${this.lootboxes}`, 20, 130);

                // Draw Battlepass XP bar on canvas
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                this.ctx.fillRect(10, 160, 200, 20);
                this.ctx.fillStyle = '#2ecc71';
                this.ctx.fillRect(10, 160, (200 * this.battlepassXP) / 100, 20);
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 1;
                this.ctx.strokeRect(10, 160, 200, 20);

                // Draw legend if legendary
                if (this.skin === 'legendary') {
                    this.ctx.fillStyle = '#ffd700';
                    this.ctx.font = 'bold 16px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('👑 LEGENDARY WEASEL 👑', this.gameWidth / 2, 25);
                }
                
                // Draw survival time
                const currentTime = this.gameState === 'gameOver' ? this.gameEndTime : Date.now();
                const survivalTime = Math.floor((currentTime - this.gameStartTime) / 1000);
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                this.ctx.fillRect(this.gameWidth - 120, 10, 110, 30);
                this.ctx.fillStyle = '#fff';
                this.ctx.textAlign = 'right';
                this.ctx.font = '14px Arial';
                this.ctx.fillText(`Time: ${survivalTime}s`, this.gameWidth - 20, 30);
            }
            
            drawMinimap() {
                const scaleX = this.minimapWidth / this.gameWidth;
                const scaleY = this.minimapHeight / this.gameHeight;
                const offsetX = this.gameWidth - this.minimapWidth - 10;
                const offsetY = this.gameHeight - this.minimapHeight - 10;
            
                // background
                this.ctx.fillStyle = 'rgba(0,0,0,0.5)';
                this.ctx.fillRect(offsetX, offsetY, this.minimapWidth, this.minimapHeight);
            
                // rings
                for (let ring of this.rings) {
                    const x = offsetX + ring.x * scaleX;
                    const y = offsetY + ring.y * scaleY;
                    this.ctx.fillStyle = 'red';
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, 3, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            
                // preview ring
                if (this.previewShown && this.nextRingPosition) {
                    const x = offsetX + this.nextRingPosition.x * scaleX;
                    const y = offsetY + this.nextRingPosition.y * scaleY;
                    this.ctx.fillStyle = 'rgba(255,255,0,0.7)';
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, 3, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            
                // player
                const px = offsetX + (this.player.x + this.player.width / 2) * scaleX;
                const py = offsetY + (this.player.y + this.player.height / 2) * scaleY;
                this.ctx.fillStyle = 'white';
                this.ctx.beginPath();
                this.ctx.arc(px, py, 4, 0, Math.PI * 2);
                this.ctx.fill();
            }
            
            drawGameOver() {
                // Draw overlay
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight);
                
                // Draw game over text
                this.ctx.fillStyle = '#ff0000';
                this.ctx.font = 'bold 48px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('GAME OVER', this.gameWidth / 2, this.gameHeight / 2 - 40);
                
                const survivalTime = Math.floor((this.gameEndTime - this.gameStartTime) / 1000);
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '24px Arial';
                this.ctx.fillText(`You survived ${survivalTime} seconds!`, this.gameWidth / 2, this.gameHeight / 2 + 20);
                
                // Show battlepass level gained
                this.ctx.font = '18px Arial';
                this.ctx.fillStyle = '#f39c12';
                this.ctx.fillText(`Battlepass Level: ${this.battlepassLevel}`, this.gameWidth / 2, this.gameHeight / 2 + 50);

                // Draw Play Again instruction
                this.ctx.font = '16px Arial';
                this.ctx.fillStyle = '#2ecc71';
                this.ctx.fillText('Press SPACE or click the canvas to play again', this.gameWidth / 2, this.gameHeight / 2 + 80);
            }
            
            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }
        //hahahaha
        //lol
        // Start the game when page loads
        window.addEventListener('load', () => {
            new WeaselGame();
        });
    </script>
</body>
