<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic RingWeasel</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #472c50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        .game-container {
            background: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        canvas {
            border: 3px solid #ecf0f1;
            background: #000;
            display: block;
            border-radius: 5px;
        }
        
        .controls {
            color: white;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        
        .controls h3 {
            margin: 0 0 10px 0;
            color: #ecf0f1;
        }
        
        .key {
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-weight: bold;
            margin: 0 2px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="controls">
            <h3>Controls</h3>
            <p>Use <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> to move. Press <span class="key">L</span> to open a lootbox.</p>
            <p>Watch the yellow circle for upcoming ring spawns.</p>
            <p><button id="paypalButton">Buy a skin / Donate</button></p>
        </div>
    </div>

    <script>
        class WeaselGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
                
                // Game settings
                this.gameWidth = this.canvas.width;
                this.gameHeight = this.canvas.height;
                
                // Player settings
                this.player = {
                    x: this.gameWidth / 2,
                    y: this.gameHeight / 2,
                    width: 64,
                    height: 64,
                    speed: 5,
                    image: null,
                    imageLoaded: false,
                    shapeIndex: 0,
                    shapes: ['square','circle','triangle']
                };
                
                // Input handling
                this.keys = {
                    w: false,
                    a: false,
                    s: false,
                    d: false
                };
                
                // Game state
                this.gameState = 'playing'; // 'playing' or 'gameOver'
                this.gameStartTime = Date.now();
                this.gameEndTime = null;
                
                // Rings
                this.rings = [];

                // Puppy background
                this.puppyImage = new Image();
                this.puppyPattern = null;
                this.ringSpawnDelay = 3000; // 3 seconds
                this.lastRingSpawn = 0;
                this.ringsSpawned = 0;

                // Upcoming spawn preview
                this.nextRingPosition = null;
                this.previewShown = false;
                this.previewDuration = 1000; // ms before spawn
                
                // Battlepass & lootboxes
                this.battlepassLevel = 1;
                this.battlepassXP = 0;
                this.lastXPUpdate = 0;
                this.lootboxes = 0;

                // Minimap settings
                this.minimapWidth = 200;
                this.minimapHeight = 150;

                // player shape timer
                this.lastShapeChange = 0;
                this.shapeChangeInterval = 5000; // every 5 seconds
                
                this.init();
            }
            
            init() {
                // Load player sprite
                this.player.image = new Image();
                this.player.image.onload = () => {
                    this.player.imageLoaded = true;
                };
                this.player.image.onerror = () => {
                    console.log('Could not load weasel.png, using placeholder');
                    this.player.imageLoaded = false;
                };
                this.player.image.src = 'weasel.png';

                // load puppy image for background
                this.puppyImage.src = 'puppy.png';
                this.puppyImage.onload = () => {
                    this.puppyPattern = this.ctx.createPattern(this.puppyImage, 'repeat');
                };
                
                // Set up event listeners
                this.setupInputHandlers();
                
                // Start game loop
                this.gameLoop();
            }
            
            setupInputHandlers() {
                document.addEventListener('keydown', (e) => {
                    switch(e.key.toLowerCase()) {
                        case 'w':
                            this.keys.w = true;
                            break;
                        case 'a':
                            this.keys.a = true;
                            break;
                        case 's':
                            this.keys.s = true;
                            break;
                        case 'd':
                            this.keys.d = true;
                            break;
                        case 'l':
                            if (this.lootboxes > 0) {
                                this.openLootbox();
                            }
                            break;
                    }
                    e.preventDefault();
                });

                // paypal button handler
                const btn = document.getElementById('paypalButton');
                if (btn) {
                    btn.addEventListener('click', () => {
                        // use PayPal.me link with provided username
                        window.open('https://www.paypal.me/KalebDLC', '_blank');
                    });
                }
                
                document.addEventListener('keyup', (e) => {
                    switch(e.key.toLowerCase()) {
                        case 'w':
                            this.keys.w = false;
                            break;
                        case 'a':
                            this.keys.a = false;
                            break;
                        case 's':
                            this.keys.s = false;
                            break;
                        case 'd':
                            this.keys.d = false;
                            break;
                    }
                    e.preventDefault();
                });
            }
            
            update() {
                if (this.gameState === 'gameOver') return;
                
                // Spawn rings every 3 seconds with preview
                const currentTime = Date.now();
                const nextSpawnTime = this.gameStartTime + this.ringSpawnDelay * (this.ringsSpawned + 1);

                if (this.ringsSpawned < 3) {
                    // show a preview marker one second before spawn
                    if (!this.previewShown && currentTime >= nextSpawnTime - this.previewDuration) {
                        this.nextRingPosition = {
                            x: Math.random() * (this.gameWidth - 60) + 30,
                            y: Math.random() * (this.gameHeight - 60) + 30
                        };
                        this.previewShown = true;
                    }
                    // actually spawn the ring at the previewed location
                    if (this.previewShown && currentTime >= nextSpawnTime) {
                        this.spawnRing(this.nextRingPosition);
                        this.ringsSpawned++;
                        this.previewShown = false;
                        this.nextRingPosition = null;
                    }
                }
                
                // Battlepass XP accrual
                const elapsedSec = Math.floor((currentTime - this.gameStartTime) / 1000);
                if (elapsedSec > this.lastXPUpdate) {
                    this.lastXPUpdate = elapsedSec;
                    this.battlepassXP += 10;
                    if (this.battlepassXP >= 100) {
                        this.battlepassXP -= 100;
                        this.battlepassLevel++;
                    }
                }

                // randomize player shape periodically
                if (currentTime - this.lastShapeChange >= this.shapeChangeInterval) {
                    this.lastShapeChange = currentTime;
                    this.player.shapeIndex = (this.player.shapeIndex + 1) % this.player.shapes.length;
                }                
                // Handle movement
                if (this.keys.w) {
                    this.player.y -= this.player.speed;
                }
                if (this.keys.s) {
                    this.player.y += this.player.speed;
                }
                if (this.keys.a) {
                    this.player.x -= this.player.speed;
                }
                if (this.keys.d) {
                    this.player.x += this.player.speed;
                }
                
                // Keep player within boundaries
                this.player.x = Math.max(0, Math.min(this.gameWidth - this.player.width, this.player.x));
                this.player.y = Math.max(0, Math.min(this.gameHeight - this.player.height, this.player.y));
                
                // Update rings
                this.updateRings();
                
                // Check collisions
                this.checkCollisions();
            }
            
            draw() {
                // Clear canvas
                this.ctx.clearRect(0, 0, this.gameWidth, this.gameHeight);
                
                // Draw puppy/grass background
                this.drawBackground();
                
                // Draw preview for upcoming ring
                if (this.previewShown && this.nextRingPosition) {
                    this.ctx.strokeStyle = 'rgba(255, 255, 0, 0.7)';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.arc(this.nextRingPosition.x, this.nextRingPosition.y, 30, 0, Math.PI * 2);
                    this.ctx.stroke();
                }

                // Draw rings
                this.drawRings();
                
                // Draw player
                this.drawPlayer();
                
                // Draw UI
                this.drawUI();

                // Draw minimap
                this.drawMinimap();
                
                // Draw game over screen if needed
                if (this.gameState === 'gameOver') {
                    this.drawGameOver();
                }
            }
            
            spawnRing(position = null) {
                const xPos = position ? position.x : Math.random() * (this.gameWidth - 60);
                const yPos = position ? position.y : Math.random() * (this.gameHeight - 60);

                const ring = {
                    x: xPos,
                    y: yPos,
                    radius: 30,
                    speed: 8 + (this.ringsSpawned * 2), // Ring 1: 8, Ring 2: 10, Ring 3: 12
                    dx: (Math.random() - 0.5) * 2, // Random direction
                    dy: (Math.random() - 0.5) * 2
                };
                
                // Normalize direction vector
                const length = Math.sqrt(ring.dx * ring.dx + ring.dy * ring.dy);
                ring.dx = (ring.dx / length) * ring.speed;
                ring.dy = (ring.dy / length) * ring.speed;
                
                this.rings.push(ring);

                // reward the player with a lootbox for every ring spawned
                this.lootboxes++;
            }
            
            updateRings() {
                // Check ring-to-ring collisions first
                for (let i = 0; i < this.rings.length; i++) {
                    for (let j = i + 1; j < this.rings.length; j++) {
                        this.checkRingCollision(this.rings[i], this.rings[j]);
                    }
                }
                
                // Update ring positions
                for (let ring of this.rings) {
                    // Move ring
                    ring.x += ring.dx;
                    ring.y += ring.dy;
                    
                    // Bounce off walls
                    if (ring.x - ring.radius <= 0 || ring.x + ring.radius >= this.gameWidth) {
                        ring.dx = -ring.dx;
                        ring.x = Math.max(ring.radius, Math.min(this.gameWidth - ring.radius, ring.x));
                    }
                    if (ring.y - ring.radius <= 0 || ring.y + ring.radius >= this.gameHeight) {
                        ring.dy = -ring.dy;
                        ring.y = Math.max(ring.radius, Math.min(this.gameHeight - ring.radius, ring.y));
                    }
                }
            }
            
            checkRingCollision(ring1, ring2) {
                const dx = ring2.x - ring1.x;
                const dy = ring2.y - ring1.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < ring1.radius + ring2.radius) {
                    // Calculate collision normal
                    const normalX = dx / distance;
                    const normalY = dy / distance;
                    
                    // Separate rings to prevent overlap
                    const overlap = ring1.radius + ring2.radius - distance;
                    const separationX = normalX * overlap * 0.5;
                    const separationY = normalY * overlap * 0.5;
                    
                    ring1.x -= separationX;
                    ring1.y -= separationY;
                    ring2.x += separationX;
                    ring2.y += separationY;
                    
                    // Calculate relative velocity
                    const relativeVelocityX = ring2.dx - ring1.dx;
                    const relativeVelocityY = ring2.dy - ring1.dy;
                    
                    // Calculate relative velocity along normal
                    const velocityAlongNormal = relativeVelocityX * normalX + relativeVelocityY * normalY;
                    
                    // Don't resolve if objects are separating
                    if (velocityAlongNormal > 0) return;
                    
                    // Calculate impulse scalar (assuming equal mass)
                    const impulse = -2 * velocityAlongNormal / 2;
                    
                    // Apply impulse to velocities
                    ring1.dx -= impulse * normalX;
                    ring1.dy -= impulse * normalY;
                    ring2.dx += impulse * normalX;
                    ring2.dy += impulse * normalY;
                }
            }
            
            checkCollisions() {
                const playerCenterX = this.player.x + this.player.width / 2;
                const playerCenterY = this.player.y + this.player.height / 2;
                const playerRadius = Math.min(this.player.width, this.player.height) / 2;
                
                for (let ring of this.rings) {
                    const distance = Math.sqrt(
                        Math.pow(playerCenterX - ring.x, 2) + 
                        Math.pow(playerCenterY - ring.y, 2)
                    );
                    
                    if (distance < playerRadius + ring.radius) {
                        this.gameState = 'gameOver';
                        this.gameEndTime = Date.now();
                        return;
                    }
                }
            }
            
            openLootbox() {
                if (this.lootboxes <= 0) return;
                const choice = Math.random();
                if (choice < 0.5) {
                    this.player.speed += 1;
                    alert('You opened a lootbox and got a speed boost!');
                } else {
                    this.battlepassXP += 50;
                    if (this.battlepassXP >= 100) {
                        this.battlepassXP -= 100;
                        this.battlepassLevel++;
                    }
                    alert('You opened a lootbox and got 50 XP!');
                }
            }
            
            drawRings() {
                this.ctx.strokeStyle = '#ff0000';
                this.ctx.lineWidth = 4;
                
                for (let ring of this.rings) {
                    this.ctx.beginPath();
                    this.ctx.arc(ring.x, ring.y, ring.radius, 0, Math.PI * 2);
                    this.ctx.stroke();
                }
            }
            
            drawBackground() {
                // draw puppy background if loaded, otherwise fallback to grass
                if (this.puppyPattern) {
                    this.ctx.fillStyle = this.puppyPattern;
                    this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight);
                } else {
                    this.ctx.fillStyle = '#2ecc71';
                    this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight);
                }
                
                // add some texture dots
                this.ctx.fillStyle = '#27ae60';
                for (let x = 0; x < this.gameWidth; x += 20) {
                    for (let y = 0; y < this.gameHeight; y += 20) {
                        if (Math.random() > 0.7) {
                            this.ctx.fillRect(x, y, 2, 2);
                        }
                    }
                }
            }
            
            drawPlayer() {
                const shape = this.player.shapes[this.player.shapeIndex];
                if (this.player.imageLoaded && this.player.image.complete) {
                    // draw image normally
                    this.ctx.drawImage(
                        this.player.image,
                        this.player.x,
                        this.player.y,
                        this.player.width,
                        this.player.height
                    );
                } else {
                    // draw placeholder shape based on current shape
                    switch(shape) {
                        case 'square':
                            this.ctx.fillStyle = '#8B4513';
                            this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                            break;
                        case 'circle':
                            this.ctx.fillStyle = '#8B4513';
                            this.ctx.beginPath();
                            this.ctx.arc(this.player.x + this.player.width/2, this.player.y + this.player.height/2, this.player.width/2, 0, Math.PI*2);
                            this.ctx.fill();
                            break;
                        case 'triangle':
                            this.ctx.fillStyle = '#8B4513';
                            this.ctx.beginPath();
                            this.ctx.moveTo(this.player.x + this.player.width/2, this.player.y);
                            this.ctx.lineTo(this.player.x, this.player.y + this.player.height);
                            this.ctx.lineTo(this.player.x + this.player.width, this.player.y + this.player.height);
                            this.ctx.closePath();
                            this.ctx.fill();
                            break;
                    }
                    // draw eyes/nose regardless on shape
                    this.ctx.fillStyle = '#000';
                    this.ctx.fillRect(this.player.x + 15, this.player.y + 15, 8, 8);
                    this.ctx.fillRect(this.player.x + 35, this.player.y + 15, 8, 8);
                    this.ctx.fillStyle = '#FF69B4';
                    this.ctx.fillRect(this.player.x + 28, this.player.y + 30, 6, 4);
                }
            }
            
            drawUI() {
                // Draw position indicator and stats
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                this.ctx.fillRect(10, 10, 200, 140);
                
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '14px Arial';
                this.ctx.textAlign = 'left';
                this.ctx.fillText(`Position: ${Math.round(this.player.x)}, ${Math.round(this.player.y)}`, 20, 30);
                this.ctx.fillText(`Speed: ${this.player.speed}`, 20, 50);
                this.ctx.fillText(`Rings: ${this.rings.length}/3`, 20, 70);
                this.ctx.fillText(`BP Lv: ${this.battlepassLevel}`, 20, 90);
                this.ctx.fillText(`XP: ${this.battlepassXP}/100`, 20, 110);
                this.ctx.fillText(`Lootboxes: ${this.lootboxes}`, 20, 130);
                
                // Draw survival time
                const currentTime = this.gameState === 'gameOver' ? this.gameEndTime : Date.now();
                const survivalTime = Math.floor((currentTime - this.gameStartTime) / 1000);
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                this.ctx.fillRect(this.gameWidth - 120, 10, 110, 30);
                this.ctx.fillStyle = '#fff';
                this.ctx.textAlign = 'right';
                this.ctx.fillText(`Time: ${survivalTime}s`, this.gameWidth - 20, 30);
            }
            
            drawMinimap() {
                const scaleX = this.minimapWidth / this.gameWidth;
                const scaleY = this.minimapHeight / this.gameHeight;
                const offsetX = this.gameWidth - this.minimapWidth - 10;
                const offsetY = this.gameHeight - this.minimapHeight - 10;
            
                // background
                this.ctx.fillStyle = 'rgba(0,0,0,0.5)';
                this.ctx.fillRect(offsetX, offsetY, this.minimapWidth, this.minimapHeight);
            
                // rings
                for (let ring of this.rings) {
                    const x = offsetX + ring.x * scaleX;
                    const y = offsetY + ring.y * scaleY;
                    this.ctx.fillStyle = 'red';
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, 3, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            
                // preview ring
                if (this.previewShown && this.nextRingPosition) {
                    const x = offsetX + this.nextRingPosition.x * scaleX;
                    const y = offsetY + this.nextRingPosition.y * scaleY;
                    this.ctx.fillStyle = 'rgba(255,255,0,0.7)';
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, 3, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            
                // player
                const px = offsetX + (this.player.x + this.player.width / 2) * scaleX;
                const py = offsetY + (this.player.y + this.player.height / 2) * scaleY;
                this.ctx.fillStyle = 'white';
                this.ctx.beginPath();
                this.ctx.arc(px, py, 4, 0, Math.PI * 2);
                this.ctx.fill();
            }
            
            drawGameOver() {
                // Draw overlay
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight);
                
                // Draw game over text
                this.ctx.fillStyle = '#ff0000';
                this.ctx.font = 'bold 48px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('GAME OVER', this.gameWidth / 2, this.gameHeight / 2 - 40);
                
                const survivalTime = Math.floor((this.gameEndTime - this.gameStartTime) / 1000);
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '24px Arial';
                this.ctx.fillText(`You survived ${survivalTime} seconds!`, this.gameWidth / 2, this.gameHeight / 2 + 20);
                
                this.ctx.font = '18px Arial';
                this.ctx.fillText('Refresh to play again', this.gameWidth / 2, this.gameHeight / 2 + 60);
            }
            
            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }
        
        // Start the game when page loads
        window.addEventListener('load', () => {
            new WeaselGame();
        });
    </script>
</body>
</html>
